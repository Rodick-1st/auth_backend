services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: backend_auth
      POSTGRES_USER: project_admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
